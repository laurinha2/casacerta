<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aluguel – Casa Certa Imobiliária</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-header {
      background: linear-gradient(135deg, var(--verde-oliva), var(--azul));
      padding: 3rem 2rem;
      color: var(--branco);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('img/interior-luxury.jpg') center/cover;
      opacity: 0.15;
    }

    .page-header-content {
      position: relative;
      z-index: 1;
    }

    .page-header h1 {
      color: var(--branco);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .hero-badges {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-badge {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: var(--branco);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    /* FILTROS */
    .filtros-bar {
      background: var(--bege);
      padding: 1.5rem 2rem;
      box-shadow: var(--sombra);
      position: sticky;
      top: 70px;
      z-index: 100;
    }

    .filtros-wrap {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .filtros-wrap .filtro-grupo {
      flex: 1;
      min-width: 120px;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .filtros-wrap label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--azul);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* RESULTADOS */
    .resultados-section {
      background: var(--bege-claro);
      padding: 3rem 2rem;
      min-height: 400px;
    }

    .resultados-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .resultados-count {
      font-size: 0.9rem;
      color: var(--texto-medio);
    }

    .resultados-count strong {
      color: var(--azul);
      font-size: 1.1rem;
    }

    .ordenar-select {
      padding: 0.5rem 1rem;
      border: 1.5px solid var(--bege-escuro);
      border-radius: var(--radius);
      font-family: 'Lato', sans-serif;
      background: var(--branco);
      color: var(--azul);
      cursor: pointer;
    }

    .cards-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .sem-resultados {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--texto-medio);
    }

    .sem-resultados h3 {
      color: var(--azul);
      margin-bottom: 0.75rem;
    }

    @media (max-width: 768px) {
      .filtros-bar { position: static; }
      .resultados-header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <div id="navbar"></div>

  <div class="page-header">
    <div class="page-header-content">
      <h1>Imóveis para Alugar</h1>
      <p>Encontre o imóvel perfeito para morar com conforto, segurança e praticidade.</p>
      <div class="hero-badges">
        <span class="hero-badge">✓ Contratos digitais</span>
        <span class="hero-badge">✓ Vistoria detalhada</span>
        <span class="hero-badge">✓ Suporte 24h</span>
        <span class="hero-badge">✓ Sem burocracia</span>
      </div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filtros-bar">
    <div class="filtros-wrap">
      <div class="filtro-grupo">
        <label>Tipo</label>
        <select id="f-tipo" class="form-control" onchange="aplicarFiltros()">
          <option value="">Todos</option>
          <option value="casa">Casa</option>
          <option value="apartamento">Apartamento</option>
          <option value="cobertura">Cobertura</option>
          <option value="studio">Studio</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Cidade</label>
        <select id="f-cidade" class="form-control" onchange="aplicarFiltros()">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Bairro</label>
        <select id="f-bairro" class="form-control" onchange="aplicarFiltros()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Quartos</label>
        <select id="f-quartos" class="form-control" onchange="aplicarFiltros()">
          <option value="">Todos</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Valor máx./mês</label>
        <select id="f-preco" class="form-control" onchange="aplicarFiltros()">
          <option value="">Qualquer</option>
          <option value="1500">até R$ 1.500</option>
          <option value="2500">até R$ 2.500</option>
          <option value="4000">até R$ 4.000</option>
          <option value="6000">até R$ 6.000</option>
          <option value="10000">até R$ 10.000</option>
        </select>
      </div>
      <div>
        <button class="btn-primary" onclick="limparFiltros()">Limpar</button>
      </div>
    </div>
  </div>

  <!-- RESULTADOS -->
  <section class="resultados-section">
    <div class="resultados-header">
      <div class="resultados-count"><strong id="count">0</strong> imóveis encontrados</div>
      <select class="ordenar-select" id="ordenar" onchange="aplicarFiltros()">
        <option value="padrao">Ordenar por: Padrão</option>
        <option value="menor-preco">Menor Preço</option>
        <option value="maior-preco">Maior Preço</option>
        <option value="maior-area">Maior Área</option>
      </select>
    </div>
    <div class="cards-container cards-grid" id="lista-imoveis">
      <div class="sem-resultados"><p>Carregando...</p></div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/componentes.js"></script>

  <script>
    // Sobrescreve aplicarFiltros() — filtra apenas aluguel
    function aplicarFiltros() {
      const tipo    = document.getElementById('f-tipo').value;
      const cidade  = document.getElementById('f-cidade').value;
      const bairro  = document.getElementById('f-bairro').value;
      const quartos = parseInt(document.getElementById('f-quartos').value) || 0;
      const preco   = parseInt(document.getElementById('f-preco').value) || 0;
      const ordenar = document.getElementById('ordenar').value;

      let lista = imoveisBanco.filter(im => {
        if (im.finalidade !== 'aluguel') return false;
        if (tipo    && im.tipo !== tipo)      return false;
        if (cidade  && im.cidade !== cidade)  return false;
        if (bairro  && im.bairro !== bairro)  return false;
        if (quartos && im.quartos < quartos)  return false;
        if (preco   && im.preco > preco)      return false;
        return true;
      });

      if (ordenar === 'menor-preco') lista.sort((a, b) => a.preco - b.preco);
      else if (ordenar === 'maior-preco') lista.sort((a, b) => b.preco - a.preco);
      else if (ordenar === 'maior-area') lista.sort((a, b) => b.area - a.area);

      document.getElementById('count').textContent = lista.length;
      const container = document.getElementById('lista-imoveis');

      popularSelectsDinamicos();

      if (lista.length === 0) {
        container.innerHTML = `
          <div class="sem-resultados">
            <h3>Nenhum imóvel encontrado</h3>
            <p>Tente ajustar os filtros para ver mais resultados.</p>
            <br>
            <button class="btn-outline" onclick="limparFiltros()">Limpar filtros</button>
          </div>`;
      } else {
        container.innerHTML = lista.map(im => renderCard(im)).join('');
      }
    }

    function popularSelectsDinamicos() {
      const cidadeSelect = document.getElementById('f-cidade');
      const bairroSelect = document.getElementById('f-bairro');
      const cidadeAtual  = cidadeSelect.value;
      const bairroAtual  = bairroSelect.value;

      const apenas_aluguel = imoveisBanco.filter(im => im.finalidade === 'aluguel');
      const cidades = [...new Set(apenas_aluguel.map(im => im.cidade).filter(Boolean))].sort();
      const bairros = [...new Set(apenas_aluguel.map(im => im.bairro).filter(Boolean))].sort();

      cidadeSelect.innerHTML = '<option value="">Todas</option>' +
        cidades.map(c => `<option value="${c}" ${c === cidadeAtual ? 'selected' : ''}>${c}</option>`).join('');

      bairroSelect.innerHTML = '<option value="">Todos</option>' +
        bairros.map(b => `<option value="${b}" ${b === bairroAtual ? 'selected' : ''}>${b}</option>`).join('');
    }

    function limparFiltros() {
      ['f-tipo', 'f-cidade', 'f-bairro', 'f-quartos', 'f-preco', 'ordenar']
        .forEach(id => document.getElementById(id).value = '');
      aplicarFiltros();
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Imóvel – Casa Certa</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .detalhes-section {
      background: var(--bege-claro);
      padding: 3rem 2rem;
    }

    .detalhes-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .detalhes-titulo {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: var(--azul);
      margin-bottom: 2rem;
    }

    .detalhes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    .galeria-main {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      height: 320px;
      background: var(--bege-escuro);
    }

    .galeria-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .galeria-fav {
      position: absolute;
      top: 14px;
      left: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 2rem;
      color: var(--branco);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      transition: var(--transition);
    }

    .galeria-fav.ativo { color: var(--vermelho); }

    .galeria-thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .galeria-thumb {
      height: 70px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.7;
      transition: var(--transition);
      border: 2px solid transparent;
    }

    .galeria-thumb.ativo { opacity: 1; border-color: var(--vermelho); }
    .galeria-thumb:hover { opacity: 1; }

    .galeria-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info-nome {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--azul);
      margin-bottom: 0.3rem;
    }

    .info-local { color: var(--texto-medio); font-size: 0.9rem; margin-bottom: 0.75rem; }

    .info-preco {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--vermelho);
      margin-bottom: 1.5rem;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .spec-item {
      text-align: center;
      background: var(--branco);
      border-radius: var(--radius);
      padding: 0.75rem;
      box-shadow: var(--sombra);
    }

    .spec-icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .spec-label { font-size: 0.78rem; color: var(--texto-medio); }
    .spec-val { font-size: 0.92rem; font-weight: 700; color: var(--azul); }

    .info-descricao {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--texto-medio);
      margin-bottom: 1.5rem;
    }

    .mapa-box {
      background: var(--branco);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--sombra);
      margin-bottom: 1rem;
    }

    .mapa-box h4 { color: var(--azul); margin-bottom: 0.5rem; font-size: 0.95rem; }

    #mapa-imovel {
      width: 100%;
      height: 180px;
      border-radius: 4px;
      background: #e8e4de;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--texto-medio);
      overflow: hidden;
    }

    #mapa-imovel iframe { width: 100%; height: 100%; border: none; }

    .acoes-box {
      background: var(--branco);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--sombra);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .acao-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      border-radius: var(--radius);
      background: var(--bege-claro);
      color: var(--azul);
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: var(--transition);
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      font-family: 'Lato', sans-serif;
    }

    .acao-btn:hover { background: var(--azul); color: var(--branco); }
    .acao-icon { font-size: 1.4rem; }

    .similares-section { background: var(--bege); padding: 3rem 2rem; }

    .sem-foto {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bege-escuro);
      color: var(--texto-medio);
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .detalhes-grid { grid-template-columns: 1fr; }
      .specs-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 480px) {
      .specs-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>

  <div id="navbar"></div>

  <section class="detalhes-section">
    <div class="detalhes-wrap">
      <h1 class="detalhes-titulo">Detalhes do Imóvel</h1>

      <div class="detalhes-grid">
        <div>
          <div class="galeria-main">
            <img id="foto-principal" src="" alt="Foto principal do imóvel"
              onerror="this.src='img/casa-padrao.jpg'">
            <button id="btn-fav" class="galeria-fav" onclick="toggleFavDetalhe()">♡</button>
          </div>
          <div class="galeria-thumbs" id="galeria-thumbs"></div>

          <div style="margin-top: 1.5rem;">
            <div class="info-nome" id="info-nome"></div>
            <div class="info-local" id="info-local"></div>
            <div class="info-preco" id="info-preco"></div>
            <div class="specs-grid" id="specs-grid"></div>
            <div class="info-descricao" id="info-descricao"></div>
            <a href="imoveis.html" class="btn-outline">Ver imóveis semelhantes</a>
          </div>
        </div>

        <div>
          <div class="mapa-box">
            <h4>📍 Localização do Imóvel</h4>
            <div id="mapa-imovel">
              <iframe id="mapa-frame" src="" title="Mapa"></iframe>
            </div>
          </div>

          <div class="acoes-box">
            <!-- ✅ Link com valor do imóvel na URL -->
            <a id="btn-financiamento" href="financiamento.html" class="acao-btn">
              <span class="acao-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                  <rect x="2" y="3" width="20" height="14" rx="2" />
                  <line x1="8" y1="21" x2="16" y2="21" />
                  <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
              </span>
              <span>Simule seu Financiamento agora</span>
            </a>
            <a href="contato.html" class="acao-btn">
              <span class="acao-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.72a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z" />
                </svg>
              </span>
              <span>Agende uma visita</span>
            </a>
            <a href="https://wa.me/5554981111111" target="_blank" class="acao-btn"
              style="background:#25D366; color:white;">
              <span class="acao-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z" />
                  <path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.564 4.14 1.545 5.872L.057 24l6.305-1.648A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.032-1.378l-.36-.214-3.733.979.996-3.648-.235-.374A9.818 9.818 0 1 1 12 21.818z" />
                </svg>
              </span>
              <span>Falar via WhatsApp</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="similares-section">
    <div class="container">
      <h2 class="section-title">Imóveis Semelhantes</h2>
      <div class="cards-grid" id="cards-similares"></div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/componentes.js"></script>
  <script>
    let imovelAtual = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(location.search);
      const id = params.get('id') || 1;

      imovelAtual = await getImovelByIdBanco(id);

      if (!imovelAtual) {
        document.querySelector('.detalhes-wrap').innerHTML =
          '<p style="padding:2rem;">Imóvel não encontrado. <a href="imoveis.html">Ver todos os imóveis</a></p>';
        return;
      }

      document.title = imovelAtual.nome + ' – Casa Certa';

      // ✅ Atualiza link de financiamento com o valor do imóvel
      if (imovelAtual.preco) {
        document.getElementById('btn-financiamento').href =
          `financiamento.html?valor=${imovelAtual.preco}`;
      }

      const todasFotos = imovelAtual.fotos.length > 0
        ? imovelAtual.fotos
        : ['img/casa-padrao.jpg'];

      const fotoPrincipalEl = document.getElementById('foto-principal');
      fotoPrincipalEl.src = todasFotos[0];
      fotoPrincipalEl.alt = imovelAtual.nome;

      const btnFav = document.getElementById('btn-fav');
      btnFav.textContent = isFavorito(imovelAtual.id) ? '♥' : '♡';
      btnFav.classList.toggle('ativo', isFavorito(imovelAtual.id));

      const thumbsEl = document.getElementById('galeria-thumbs');
      if (todasFotos.length > 1) {
        thumbsEl.innerHTML = todasFotos.map((src, i) => `
          <div class="galeria-thumb ${i === 0 ? 'ativo' : ''}" onclick="trocarFoto('${src}', this)">
            <img src="${src}" alt="Foto ${i + 1}" loading="lazy" onerror="this.src='img/casa-padrao.jpg'">
          </div>
        `).join('');
      } else {
        thumbsEl.innerHTML = '';
      }

      document.getElementById('info-nome').textContent = imovelAtual.nome;
      document.getElementById('info-local').textContent =
        `📍 ${imovelAtual.bairro} – ${imovelAtual.cidade}`;
      document.getElementById('info-preco').textContent =
        formatarPreco(imovelAtual.preco, imovelAtual.finalidade);
      document.getElementById('info-descricao').textContent =
        imovelAtual.descricao || 'Descrição não disponível.';

      const svgArea = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
      const svgQuartos = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>`;
      const svgBanheiro = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M9 6 6.5 3.5a1.5 1.5 0 0 0-1-.5C4.683 3 4 3.683 4 4.5V17a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/><line x1="10" y1="5" x2="8" y2="7"/><line x1="2" y1="12" x2="22" y2="12"/></svg>`;
      const svgVagas = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`;

      const specs = [
        { icon: svgArea,     val: imovelAtual.area + ' m²', label: 'Área' },
        { icon: svgQuartos,  val: imovelAtual.quartos,       label: 'Quartos' },
        { icon: svgBanheiro, val: imovelAtual.banheiros,     label: 'Banheiros' },
        { icon: svgVagas,    val: imovelAtual.vagas || '0',  label: 'Vagas' },
      ];

      document.getElementById('specs-grid').innerHTML = specs.map(s => `
        <div class="spec-item">
          <div class="spec-icon" style="color:var(--azul)">${s.icon}</div>
          <div class="spec-val">${s.val}</div>
          <div class="spec-label">${s.label}</div>
        </div>
      `).join('');

      const enderecoMapa = encodeURIComponent(
        `${imovelAtual.bairro}, ${imovelAtual.cidade}, Brasil`
      );
      document.getElementById('mapa-frame').src =
        `https://maps.google.com/maps?q=${enderecoMapa}&z=15&output=embed`;

      try {
        const resAll = await fetch(`${API}/imoveis/publicos`);
        const todosImoveis = await resAll.json();
        const similares = todosImoveis
          .filter(im => im.id !== imovelAtual.id &&
            (im.tipo || '').toLowerCase() === imovelAtual.tipo)
          .slice(0, 3)
          .map(im => {
            const fs = parsearFotos(im.fotos);
            return {
              id: im.id,
              nome: im.tipo,
              tipo: (im.tipo || '').toLowerCase(),
              imagem: fs.length > 0 ? fs[0] : 'img/casa-padrao.jpg',
              galeria: fs.slice(1),
              fotos: fs,
              bairro: im.bairro || '--',
              cidade: im.cidade || '--',
              preco: Number((im.valor || '0').toString().replace(/[R$\s.]/g, '').replace(',', '.')) || 0,
              finalidade: im.finalidade ? im.finalidade.toLowerCase() : 'venda',
              area: im.area || '--',
              quartos: im.quartos || 0,
              banheiros: im.banheiros || '--',
              vagas: im.vagas || 0,
              descricao: im.descricao || '',
              extras: []
            };
          });

        const containerSimilares = document.getElementById('cards-similares');
        containerSimilares.innerHTML = similares.length > 0
          ? similares.map(renderCard).join('')
          : '<p style="color:var(--texto-medio)">Nenhum imóvel semelhante encontrado.</p>';
      } catch (e) {
        console.error('Erro ao carregar similares:', e);
      }
    });

    function trocarFoto(src, el) {
      document.getElementById('foto-principal').src = src;
      document.querySelectorAll('.galeria-thumb').forEach(t => t.classList.remove('ativo'));
      el.classList.add('ativo');
    }

    function toggleFavDetalhe() {
      if (!imovelAtual) return;
      toggleFavorito(imovelAtual.id).then(adicionado => {
        const btn = document.getElementById('btn-fav');
        btn.textContent = adicionado ? '♥' : '♡';
        btn.classList.toggle('ativo', adicionado);
      });
    }
  </script>
</body>

</html>
